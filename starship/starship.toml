# ╔══════════════════════════════════════════════════════════════╗
# ║               Starship Prompt               ║
# ╚══════════════════════════════════════════════════════════════╝

# Prompt format: what you see on every line
format = """
$directory\
$git_branch\
$git_status\
$kubernetes\
$aws\
$gcloud\
$terraform\
$docker_context\
$cmd_duration\
$line_break\
$character"""

# Timeout for commands (ms)
command_timeout = 1000

# ── Directory ─────────────────────────────────────────────────
[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

# ── Git ───────────────────────────────────────────────────────
[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
style = "bold purple"
symbol = " "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"

# ── Kubernetes ────────────────────────────────────────────────
[kubernetes]
disabled = false
format = '[$symbol$context(:$namespace)]($style) '
style = "bold yellow"
symbol = "☸ "

# Detect prod contexts and highlight them
[[kubernetes.contexts]]
context_pattern = ".*prod.*"
style = "bold red"
symbol = "☸ "

[[kubernetes.contexts]]
context_pattern = ".*staging.*"
style = "bold yellow"
symbol = "☸ "

# ── AWS ───────────────────────────────────────────────────────
[aws]
format = '[$symbol($profile )(\($region\))]($style) '
style = "bold #ff9900"
symbol = " "

[aws.region_aliases]
us-east-1 = "use1"
us-west-2 = "usw2"
eu-west-1 = "euw1"
eu-central-1 = "euc1"
ap-southeast-1 = "apse1"

# ── Google Cloud ──────────────────────────────────────────────
[gcloud]
format = '[$symbol($project)]($style) '
style = "bold #4285F4"
symbol = "󱇶 "

# ── Terraform ─────────────────────────────────────────────────
[terraform]
format = '[$symbol$workspace]($style) '
style = "bold #844fba"
symbol = "󱁢 "

# ── Docker ────────────────────────────────────────────────────
[docker_context]
format = '[$symbol$context]($style) '
style = "bold #2496ED"
symbol = " "
only_with_files = true

# ── Command Duration ──────────────────────────────────────────
[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
style = "bold yellow"

# ── Prompt Character ──────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

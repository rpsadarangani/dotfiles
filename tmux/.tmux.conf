# ╔══════════════════════════════════════════════════════════════╗
# ║                  Tmux Config — SRE Friendly                  ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Prefix ────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ───────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1                    # Start window numbering at 1
setw -g pane-base-index 1             # Start pane numbering at 1
set -g renumber-windows on            # Renumber windows on close
set -g set-clipboard on
set -sg escape-time 0                 # No delay for escape key
set -g history-limit 50000            # Scrollback buffer
set -g display-time 3000              # Message display time
set -g focus-events on

# ── Splits ────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Navigation (vim-style) ───────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Resize (vim-style) ───────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Quick Actions ─────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
bind S command-prompt -p "New session:" "new-session -s '%%'"
bind X confirm-before -p "Kill session? (y/n)" kill-session

# ── Copy Mode (vim-style) ────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ── Status Bar ────────────────────────────────────────────────
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#1a1b26,fg=#c0caf5"

set -g status-left-length 40
set -g status-left "#[fg=#7aa2f7,bold] #S #[fg=#545c7e]│ "

set -g status-right-length 80
set -g status-right "#[fg=#9ece6a]#{?client_prefix,PREFIX ,}#[fg=#545c7e]│ #[fg=#bb9af7]%H:%M #[fg=#545c7e]│ #[fg=#7dcfff]%d-%b"

# Window status
setw -g window-status-format "#[fg=#545c7e] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "

# ── Pane Borders ──────────────────────────────────────────────
set -g pane-border-style "fg=#545c7e"
set -g pane-active-border-style "fg=#7aa2f7"
